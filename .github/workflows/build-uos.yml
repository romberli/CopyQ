name: Build for UOS

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*-uos*']

env:
  # Pin versions used on legacy glibc 2.28 (Debian 10 / UOS 20).
  CMAKE_VERSION: '3.27.9'
  QT_VERSION: '6.4.3'
  QCA_VERSION: '2.3.10'
  QTKEYCHAIN_VERSION: '0.15.0'
  MINIAUDIO_COMMIT: '9634bedb5b5a2ca38c1ee7108a9358a4e233f14d'
  MINIAUDIO_SHA256: 'ac7af4de748b7e26b777f37e01cee313a308a7296a3eb080e2906b320cc55c89'

  LINUXDEPLOY_URL: 'https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20250213-2/linuxdeploy-x86_64.AppImage'
  LINUXDEPLOY_PLUGIN_QT_URL: 'https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-qt-x86_64.AppImage'
  LINUXDEPLOY_PLUGIN_APPIMAGE_URL: 'https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-appimage-x86_64.AppImage'

jobs:
  build:
    name: Build UOS-Compatible AppImage (glibc 2.28)
    runs-on: ubuntu-latest
    # Build inside Debian 10 so the resulting binary links against glibc 2.28.
    # Debian 10 (buster) is EOL; we use archive.debian.org below.
    container:
      image: debian:10
      # linuxdeploy/appimage needs FUSE. The --privileged option is not
      # available here, so we extract the AppImage instead of executing it.
      options: --user root

    steps:
      - name: Configure APT for archived Debian 10 (buster)
        run: |
          set -eux
          # Debian 10 is EOL — official mirrors drop it; use archive.debian.org.
          cat >/etc/apt/sources.list <<'EOF'
          deb http://archive.debian.org/debian buster main contrib non-free
          deb http://archive.debian.org/debian-security buster/updates main contrib non-free
          EOF
          # Disable "Valid-Until" check (archived repos have expired signatures).
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
          apt-get update

      - name: Install build dependencies
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y --no-install-recommends \
            build-essential ninja-build ccache git curl wget ca-certificates \
            xz-utils file sudo pkg-config \
            libssl-dev libxfixes-dev libxtst-dev extra-cmake-modules \
            libwayland-dev libegl1-mesa-dev libgl1-mesa-dev libxkbcommon-dev \
            libxcb1-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-x11-dev libdbus-1-dev libsecret-1-dev \
            libfuse2 p7zip-full \
            python3 python3-pip python3-setuptools python3-wheel python3-dev python3-venv

      - name: Install modern CMake (Debian 10 only has 3.13; CopyQ/QCA need >= 3.16)
        run: |
          set -eux
          curl -fsSLo /tmp/cmake.tar.gz \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz"
          mkdir -p /opt/cmake
          tar -xzf /tmp/cmake.tar.gz -C /opt/cmake --strip-components=1
          rm -f /tmp/cmake.tar.gz
          ln -sf /opt/cmake/bin/cmake     /usr/local/bin/cmake
          ln -sf /opt/cmake/bin/ctest     /usr/local/bin/ctest
          ln -sf /opt/cmake/bin/cpack     /usr/local/bin/cpack
          ln -sf /opt/cmake/bin/ccmake    /usr/local/bin/ccmake
          cmake --version

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust container working directory as git repo
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Enable ccache
        run: |
          set -eux
          mkdir -p "$HOME/.ccache"
          echo "CCACHE_DIR=$HOME/.ccache"   >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=500M"        >> "$GITHUB_ENV"
          echo "PATH=/usr/lib/ccache:$PATH" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-uos-debian10-${{ github.sha }}
          restore-keys: |
            ccache-uos-debian10-

      - name: Install Qt 6 via aqtinstall (into a virtualenv)
        run: |
          set -eux
          # Use a venv so pip doesn't fight the system packages on Debian 10.
          python3 -m venv /opt/aqt-venv
          /opt/aqt-venv/bin/pip install --upgrade pip wheel
          # aqtinstall 3.x supports Python 3.7 (Debian 10) and Qt 6.4.x.
          # It pulls compatible versions of py7zr, requests, etc. itself.
          /opt/aqt-venv/bin/pip install 'aqtinstall==3.1.15'

          /opt/aqt-venv/bin/aqt install-qt \
            linux desktop "${QT_VERSION}" gcc_64 \
            -O /opt/Qt \
            -m qt5compat qtwayland qtsvg qtimageformats

          QT_DIR="/opt/Qt/${QT_VERSION}/gcc_64"
          echo "Qt6_DIR=${QT_DIR}/lib/cmake/Qt6"       >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${QT_DIR}"           >> "$GITHUB_ENV"
          echo "QT_ROOT_DIR=${QT_DIR}"                 >> "$GITHUB_ENV"
          echo "QT_PLUGIN_PATH=${QT_DIR}/plugins"      >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${QT_DIR}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "${QT_DIR}/bin" >> "$GITHUB_PATH"

      - name: Build QCA (for QCA-based tab encryption)
        run: |
          set -eux
          git clone --depth 1 --branch "v${QCA_VERSION}" \
            https://github.com/KDE/qca.git /tmp/qca
          cmake -G Ninja -S /tmp/qca -B /tmp/qca-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DBUILD_WITH_QT6=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_TOOLS=OFF \
            -DBUILD_PLUGINS=ossl
          cmake --build /tmp/qca-build --parallel
          cmake --install /tmp/qca-build

      - name: Build QtKeychain (for system keyring integration)
        run: |
          set -eux
          git clone --depth 1 --branch "${QTKEYCHAIN_VERSION}" \
            https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cmake -G Ninja -S /tmp/qtkeychain -B /tmp/qtkeychain-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DBUILD_WITH_QT6=ON \
            -DBUILD_TRANSLATIONS=OFF
          cmake --build /tmp/qtkeychain-build --parallel
          cmake --install /tmp/qtkeychain-build

          echo "/usr/local/lib" > /etc/ld.so.conf.d/local.conf
          ldconfig
          echo "LD_LIBRARY_PATH=/usr/local/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Download miniaudio header
        run: |
          set -eux
          curl -fsSLo src/miniaudio.h \
            "https://raw.githubusercontent.com/mackron/miniaudio/${MINIAUDIO_COMMIT}/miniaudio.h"
          echo "${MINIAUDIO_SHA256}  src/miniaudio.h" | sha256sum -c -

      - name: Configure CopyQ (AppImage-Release preset)
        run: |
          set -eux
          # Prepend /usr/local (QCA + QtKeychain) and Qt to CMAKE_PREFIX_PATH.
          export CMAKE_PREFIX_PATH="/usr/local:${CMAKE_PREFIX_PATH}"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DWITH_APPIMAGE=TRUE \
            -DWITH_QCA_ENCRYPTION=TRUE \
            -DWITH_KEYCHAIN=TRUE \
            -DWITH_TESTS=OFF

      - name: Build CopyQ
        run: cmake --build build --parallel

      - name: Extract version string
        id: version
        run: |
          set -eux
          VERSION_FILE="build/src/common/version.cpp"
          if [[ ! -f "$VERSION_FILE" ]]; then
            echo "::error::Version file not found: $VERSION_FILE"
            exit 1
          fi
          version=$(sed -n 's/.*versionString("\(.*\)").*/\1/p' "$VERSION_FILE")
          if [[ -z "$version" ]]; then
            echo "::error::Failed to extract version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Install CopyQ into AppDir
        run: |
          set -eux
          DESTDIR="${GITHUB_WORKSPACE}/AppDir" cmake --install build

      - name: Download linuxdeploy tools
        run: |
          set -eux
          mkdir -p "$HOME/.local/bin"
          cd "$HOME/.local/bin"
          curl -fsSLo linuxdeploy                 "$LINUXDEPLOY_URL"
          curl -fsSLo linuxdeploy-plugin-qt       "$LINUXDEPLOY_PLUGIN_QT_URL"
          curl -fsSLo linuxdeploy-plugin-appimage "$LINUXDEPLOY_PLUGIN_APPIMAGE_URL"
          chmod +x linuxdeploy*
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create AppImage
        env:
          DESTDIR: ${{ github.workspace }}/AppDir
          VERSION: ${{ steps.version.outputs.version }}
          EXTRA_QT_MODULES: 'svg;tls'
          EXTRA_PLATFORM_PLUGINS: 'libqwayland.so'
        run: |
          set -eux
          export QMAKE="${QT_ROOT_DIR}/bin/qmake6"

          # Bundle QCA ossl plugin — its location varies by distro.
          mkdir -p "$DESTDIR/usr/plugins/crypto"
          qca_ossl=$(find /usr/local/lib /usr/lib /usr/lib64 /usr/lib/x86_64-linux-gnu \
              -name 'libqca-ossl.so' -print -quit 2>/dev/null || true)
          if [ -z "$qca_ossl" ]; then
              echo "::error::QCA ossl plugin (libqca-ossl.so) not found"
              exit 1
          fi
          echo "Found QCA ossl plugin: $qca_ossl"
          cp -a "$qca_ossl" "$DESTDIR/usr/plugins/crypto/"

          # linuxdeploy normally requires FUSE to run the AppImages, which is
          # not available in every CI container. Extract them and invoke the
          # resulting AppRun directly.
          cd "$HOME/.local/bin"
          for f in linuxdeploy linuxdeploy-plugin-qt linuxdeploy-plugin-appimage; do
            if ! "./$f" --appimage-version >/dev/null 2>&1; then
              "./$f" --appimage-extract >/dev/null
              mv squashfs-root "${f}.extracted"
              rm -f "$f"
              ln -sf "${f}.extracted/AppRun" "$f"
            fi
          done

          cd "$GITHUB_WORKSPACE"

          linuxdeploy --appdir "$DESTDIR" \
            --desktop-file "$DESTDIR/usr/share/applications/com.github.hluk.copyq.desktop" \
            --icon-file "$DESTDIR/usr/share/icons/hicolor/scalable/apps/copyq.svg" \
            --executable "$DESTDIR/usr/bin/copyq" \
            --deploy-deps-only "$DESTDIR/usr/plugins/crypto" \
            --plugin qt \
            --output appimage

          # Rename to a more descriptive name that signals UOS compatibility.
          for f in CopyQ-*.AppImage; do
            mv "$f" "CopyQ-${VERSION}-uos20-glibc2.28-x86_64.AppImage"
          done
          ls -la CopyQ-*.AppImage

      - name: Smoke-test AppImage
        env:
          APPIMAGE: CopyQ-${{ steps.version.outputs.version }}-uos20-glibc2.28-x86_64.AppImage
        run: |
          set -eux
          # Extract and run — containers usually lack FUSE.
          ./"$APPIMAGE" --appimage-extract >/dev/null
          ./squashfs-root/AppRun --version
          # Verify glibc version requirement does not exceed 2.28.
          max_ver=$(objdump -T ./squashfs-root/usr/bin/copyq 2>/dev/null \
            | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V -u | tail -n1 || true)
          echo "Max GLIBC symbol required by copyq binary: ${max_ver:-<none>}"
          case "$max_ver" in
            ""|GLIBC_2.0|GLIBC_2.[0-9]|GLIBC_2.1[0-9]|GLIBC_2.2[0-8])
              echo "OK: fits into glibc 2.28"
              ;;
            *)
              echo "::warning::Binary references ${max_ver}, which is newer than 2.28 — it may not run on UOS 20."
              ;;
          esac
          rm -rf squashfs-root

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: CopyQ-UOS-AppImage
          path: CopyQ-*.AppImage
          if-no-files-found: error
