name: Build for UOS

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*-uos*']

env:
  # Pin versions used on legacy glibc 2.28 (Debian 10 / UOS 20).
  CMAKE_VERSION: '3.27.9'
  QT_VERSION: '6.4.3'
  QCA_VERSION: '2.3.10'
  QTKEYCHAIN_VERSION: '0.15.0'
  MINIAUDIO_COMMIT: '9634bedb5b5a2ca38c1ee7108a9358a4e233f14d'
  MINIAUDIO_SHA256: 'ac7af4de748b7e26b777f37e01cee313a308a7296a3eb080e2906b320cc55c89'

  LINUXDEPLOY_URL: 'https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20250213-2/linuxdeploy-x86_64.AppImage'
  LINUXDEPLOY_PLUGIN_QT_URL: 'https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-qt-x86_64.AppImage'
  LINUXDEPLOY_PLUGIN_APPIMAGE_URL: 'https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/1-alpha-20250213-1/linuxdeploy-plugin-appimage-x86_64.AppImage'

jobs:
  build:
    name: Build UOS-Compatible AppImage (glibc 2.28)
    runs-on: ubuntu-latest
    # Build inside Debian 10 so the resulting binary links against glibc 2.28.
    # Debian 10 (buster) is EOL; we use archive.debian.org below.
    container:
      image: debian:10
      # linuxdeploy/appimage needs FUSE. The --privileged option is not
      # available here, so we extract the AppImage instead of executing it.
      options: --user root

    steps:
      - name: Configure APT for archived Debian 10 (buster)
        run: |
          set -eux
          # Debian 10 is EOL — official mirrors drop it; use archive.debian.org.
          cat >/etc/apt/sources.list <<'EOF'
          deb http://archive.debian.org/debian buster main contrib non-free
          deb http://archive.debian.org/debian-security buster/updates main contrib non-free
          EOF
          # Disable "Valid-Until" check (archived repos have expired signatures).
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
          apt-get update

      - name: Install build dependencies
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y --no-install-recommends \
            build-essential ninja-build ccache git curl wget ca-certificates \
            xz-utils file sudo pkg-config \
            libssl-dev libxfixes-dev libxtst-dev extra-cmake-modules \
            libwayland-dev libwayland-bin wayland-protocols \
            libegl1-mesa-dev libgl1-mesa-dev libxkbcommon-dev \
            libglvnd0 libopengl0 libglx0 libegl1 libgles2 \
            libxcb1-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-x11-dev libdbus-1-dev libsecret-1-dev \
            libfontconfig1-dev libfreetype6-dev libglib2.0-dev \
            libxrender-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libxext-dev \
            libice-dev libsm-dev libinput-dev libmtdev-dev \
            libfuse2 p7zip-full \
            python3 python3-pip python3-setuptools python3-wheel python3-dev python3-venv

      - name: Install modern CMake (Debian 10 only has 3.13; CopyQ/QCA need >= 3.16)
        run: |
          set -eux
          curl -fsSLo /tmp/cmake.tar.gz \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz"
          mkdir -p /opt/cmake
          tar -xzf /tmp/cmake.tar.gz -C /opt/cmake --strip-components=1
          rm -f /tmp/cmake.tar.gz
          ln -sf /opt/cmake/bin/cmake     /usr/local/bin/cmake
          ln -sf /opt/cmake/bin/ctest     /usr/local/bin/ctest
          ln -sf /opt/cmake/bin/cpack     /usr/local/bin/cpack
          ln -sf /opt/cmake/bin/ccmake    /usr/local/bin/ccmake
          cmake --version

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust container working directory as git repo
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Enable ccache
        run: |
          set -eux
          mkdir -p "$HOME/.ccache"
          echo "CCACHE_DIR=$HOME/.ccache"   >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=500M"        >> "$GITHUB_ENV"
          echo "PATH=/usr/lib/ccache:$PATH" >> "$GITHUB_ENV"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-uos-debian10-${{ github.sha }}
          restore-keys: |
            ccache-uos-debian10-

      - name: Install Qt 6 via aqtinstall (into a virtualenv)
        run: |
          set -eux
          # Use a venv so pip doesn't fight the system packages on Debian 10.
          python3 -m venv /opt/aqt-venv
          /opt/aqt-venv/bin/pip install --upgrade pip wheel
          # aqtinstall 3.x supports Python 3.7 (Debian 10) and Qt 6.4.x.
          # It pulls compatible versions of py7zr, requests, etc. itself.
          /opt/aqt-venv/bin/pip install 'aqtinstall==3.1.15'

          # Only qt5compat is a real add-on module for Qt 6.4.3.
          # qtsvg / qtwayland / qtimageformats are shipped inside the base
          # linux/desktop/gcc_64 package, so we don't list them here.
          /opt/aqt-venv/bin/aqt install-qt \
            linux desktop "${QT_VERSION}" gcc_64 \
            -O /opt/Qt \
            -m qt5compat

          QT_DIR="/opt/Qt/${QT_VERSION}/gcc_64"
          echo "Qt6_DIR=${QT_DIR}/lib/cmake/Qt6"       >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${QT_DIR}"           >> "$GITHUB_ENV"
          echo "QT_ROOT_DIR=${QT_DIR}"                 >> "$GITHUB_ENV"
          echo "QT_PLUGIN_PATH=${QT_DIR}/plugins"      >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${QT_DIR}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "${QT_DIR}/bin" >> "$GITHUB_PATH"

      - name: Build QCA (for QCA-based tab encryption)
        run: |
          set -eux
          git clone --depth 1 --branch "v${QCA_VERSION}" \
            https://github.com/KDE/qca.git /tmp/qca
          cmake -G Ninja -S /tmp/qca -B /tmp/qca-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DBUILD_WITH_QT6=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_TOOLS=OFF \
            -DBUILD_PLUGINS=ossl
          cmake --build /tmp/qca-build --parallel
          cmake --install /tmp/qca-build

      - name: Build QtKeychain (for system keyring integration)
        run: |
          set -eux
          git clone --depth 1 --branch "${QTKEYCHAIN_VERSION}" \
            https://github.com/frankosterfeld/qtkeychain.git /tmp/qtkeychain
          cmake -G Ninja -S /tmp/qtkeychain -B /tmp/qtkeychain-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DBUILD_WITH_QT6=ON \
            -DBUILD_TRANSLATIONS=OFF
          cmake --build /tmp/qtkeychain-build --parallel
          cmake --install /tmp/qtkeychain-build

          echo "/usr/local/lib" > /etc/ld.so.conf.d/local.conf
          ldconfig
          echo "LD_LIBRARY_PATH=/usr/local/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Download miniaudio header
        run: |
          set -eux
          curl -fsSLo src/miniaudio.h \
            "https://raw.githubusercontent.com/mackron/miniaudio/${MINIAUDIO_COMMIT}/miniaudio.h"
          echo "${MINIAUDIO_SHA256}  src/miniaudio.h" | sha256sum -c -

      - name: Configure CopyQ (AppImage-Release preset)
        run: |
          set -eux
          # Prepend /usr/local (QCA + QtKeychain) and Qt to CMAKE_PREFIX_PATH.
          export CMAKE_PREFIX_PATH="/usr/local:${CMAKE_PREFIX_PATH}"
          # ECM 5.56 (Debian 10) doesn't export Wayland_DATADIR from
          # FindWayland.cmake. Query wayland-scanner directly and pass it in.
          WAYLAND_DATADIR=$(pkg-config --variable=pkgdatadir wayland-scanner)
          echo "Wayland_DATADIR=$WAYLAND_DATADIR"

          # WITH_NATIVE_NOTIFICATIONS needs KDE Frameworks 6 (KF6 >= 5.248),
          # which isn't available on Debian 10 / UOS 20. CopyQ falls back
          # to its built-in notification popup without it.
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DWayland_DATADIR="$WAYLAND_DATADIR" \
            -DWITH_APPIMAGE=TRUE \
            -DWITH_QCA_ENCRYPTION=TRUE \
            -DWITH_KEYCHAIN=TRUE \
            -DWITH_NATIVE_NOTIFICATIONS=FALSE \
            -DWITH_TESTS=OFF

      - name: Build CopyQ
        run: cmake --build build --parallel

      - name: Extract version string
        id: version
        run: |
          set -eux
          VERSION_FILE="build/src/common/version.cpp"
          if [[ ! -f "$VERSION_FILE" ]]; then
            echo "::error::Version file not found: $VERSION_FILE"
            exit 1
          fi
          version=$(sed -n 's/.*versionString("\(.*\)").*/\1/p' "$VERSION_FILE")
          if [[ -z "$version" ]]; then
            echo "::error::Failed to extract version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Install CopyQ into AppDir
        run: |
          set -eux
          DESTDIR="${GITHUB_WORKSPACE}/AppDir" cmake --install build

      - name: Download linuxdeploy tools
        run: |
          set -eux
          mkdir -p "$HOME/.local/bin"
          cd "$HOME/.local/bin"
          curl -fsSLo linuxdeploy                 "$LINUXDEPLOY_URL"
          curl -fsSLo linuxdeploy-plugin-qt       "$LINUXDEPLOY_PLUGIN_QT_URL"
          curl -fsSLo linuxdeploy-plugin-appimage "$LINUXDEPLOY_PLUGIN_APPIMAGE_URL"
          chmod +x linuxdeploy*
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create AppImage
        env:
          DESTDIR: ${{ github.workspace }}/AppDir
          VERSION: ${{ steps.version.outputs.version }}
          EXTRA_QT_MODULES: 'svg;tls'
          # In Qt 6 the wayland plugin is called libqwayland-generic.so, not
          # libqwayland.so. UOS 20 defaults to X11 anyway; the xcb platform
          # plugin is deployed automatically by linuxdeploy-plugin-qt.
          EXTRA_PLATFORM_PLUGINS: 'libqwayland-generic.so'
        run: |
          set -eux
          export QMAKE="${QT_ROOT_DIR}/bin/qmake6"

          # Bundle QCA ossl plugin — its location varies by distro.
          mkdir -p "$DESTDIR/usr/plugins/crypto"
          qca_ossl=$(find /usr/local/lib /usr/lib /usr/lib64 /usr/lib/x86_64-linux-gnu \
              -name 'libqca-ossl.so' -print -quit 2>/dev/null || true)
          if [ -z "$qca_ossl" ]; then
              echo "::error::QCA ossl plugin (libqca-ossl.so) not found"
              exit 1
          fi
          echo "Found QCA ossl plugin: $qca_ossl"
          cp -a "$qca_ossl" "$DESTDIR/usr/plugins/crypto/"

          # FUSE isn't available inside GitHub Actions containers.
          # APPIMAGE_EXTRACT_AND_RUN=1 tells type-2 AppImages to self-extract
          # to a temp dir and run from there — used by linuxdeploy, its plugins,
          # and the appimagetool that linuxdeploy-plugin-appimage invokes.
          export APPIMAGE_EXTRACT_AND_RUN=1

          # Step 1: Let linuxdeploy deploy Qt and its own set of libs.
          # We'll produce the AppImage ourselves in step 3 after dep-fixup,
          # so don't pass --output appimage here.
          linuxdeploy --appdir "$DESTDIR" \
            --desktop-file "$DESTDIR/usr/share/applications/com.github.hluk.copyq.desktop" \
            --icon-file "$DESTDIR/usr/share/icons/hicolor/scalable/apps/copyq.svg" \
            --executable "$DESTDIR/usr/bin/copyq" \
            --deploy-deps-only "$DESTDIR/usr/plugins/crypto" \
            --plugin qt

          # Step 2: Bundle every indirect .so dependency that linuxdeploy's
          # hard-coded blacklist skipped. On UOS 20 minimal installs these
          # simply aren't present (libOpenGL/libGLX/libfreetype/libfontconfig
          # are the common ones). We keep a narrow allow-list of things that
          # MUST stay linked to the host: glibc (libc/m/pthread/dl/rt/resolv,
          # ld-linux) and the GPU driver stub libGL.so.1.
          #
          # The loop keeps scanning until nothing new is added (transitive
          # closure of ldd over everything inside AppDir).
          mkdir -p "$DESTDIR/usr/lib"

          is_excluded() {
            # Libraries we intentionally leave to the host system.
            case "$1" in
              ld-linux*|ld-linux-*.so.*|ld.so.*) return 0 ;;
              libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*|librt.so.*) return 0 ;;
              libresolv.so.*|libnsl.so.*|libutil.so.*|libnss_*.so.*) return 0 ;;
              # GPU userspace driver stub — must match the running kernel's driver.
              libGL.so.*|libdrm.so.*|libGLdispatch.so.*) return 0 ;;
              # libGLdispatch is sometimes bundled via libglvnd; if you need
              # it bundled, drop the last entry above. We bundle it on UOS.
              *) return 1 ;;
            esac
          }

          # Actually we DO want to bundle libOpenGL/libGLX/libGLdispatch, so
          # revise the exclusion list (keep them in AppImage).
          is_excluded() {
            case "$1" in
              ld-linux*|ld-linux-*.so.*|ld.so.*) return 0 ;;
              libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*|librt.so.*) return 0 ;;
              libresolv.so.*|libnsl.so.*|libutil.so.*|libnss_*.so.*) return 0 ;;
              libGL.so.*|libdrm.so.*) return 0 ;;
              *) return 1 ;;
            esac
          }

          copy_so() {
            local src="$1"
            local soname="$2"
            local real
            real=$(readlink -f "$src")
            local base
            base=$(basename "$real")
            if [ ! -f "$DESTDIR/usr/lib/$base" ]; then
              cp -a "$real" "$DESTDIR/usr/lib/"
            fi
            if [ "$soname" != "$base" ] && \
               [ ! -e "$DESTDIR/usr/lib/$soname" ]; then
              ( cd "$DESTDIR/usr/lib" && ln -sf "$base" "$soname" )
            fi
          }

          scan_pass() {
            local added=0
            # All ELFs: main binary, Qt/QCA plugins, and already-bundled libs.
            # We rescan bundled libs too so transitive deps are followed.
            find "$DESTDIR" -type f \( -name '*.so' -o -name '*.so.*' \
                                       -o -path '*/bin/*' \
                                       -o -path '*/libexec/*' \) \
                2>/dev/null | while read -r elf; do
              # Skip non-ELFs cheaply using `file` (already installed).
              file -b --mime-type "$elf" 2>/dev/null | \
                grep -q 'application/x-\(pie-\)\?executable\|application/x-sharedlib' || continue
              ldd "$elf" 2>/dev/null | while read -r line; do
                # Parse "libfoo.so.1 => /path/to/libfoo.so.1 (0x...)"
                soname=$(echo "$line" | awk '{print $1}')
                path=$(echo "$line" | awk '/=>/ {print $3}')
                [ -z "$soname" ] && continue
                [ -z "$path" ] && continue
                [ "$path" = "not" ] && continue  # "not found"
                case "$path" in /*) ;; *) continue ;; esac
                # Skip if path is already inside AppDir.
                case "$path" in "$DESTDIR"/*) continue ;; esac
                is_excluded "$soname" && continue
                # Copy if not yet present.
                if [ ! -e "$DESTDIR/usr/lib/$soname" ]; then
                  copy_so "$path" "$soname"
                  echo "  bundled: $soname  <-  $path"
                  added=1
                fi
              done
            done
            return $added
          }

          echo "--- Dependency fixup: bundling missing non-glibc libraries ---"
          for i in 1 2 3 4 5; do
            echo "Pass $i:"
            prev_count=$(find "$DESTDIR/usr/lib" -maxdepth 1 -type f | wc -l)
            scan_pass || true
            new_count=$(find "$DESTDIR/usr/lib" -maxdepth 1 -type f | wc -l)
            if [ "$prev_count" -eq "$new_count" ]; then
              echo "  (no new libraries in pass $i — closure reached)"
              break
            fi
          done
          echo "--- Final bundled library count: $(find "$DESTDIR/usr/lib" -maxdepth 1 -type f | wc -l) ---"

          # Sanity-check: no ELF inside AppDir should have unresolved
          # non-glibc deps. Report any that remain.
          echo "--- Verifying no missing deps (excluding host glibc/libGL) ---"
          missing=0
          while read -r elf; do
            file -b --mime-type "$elf" 2>/dev/null | \
              grep -q 'application/x-\(pie-\)\?executable\|application/x-sharedlib' || continue
            while read -r dep; do
              is_excluded "$dep" && continue
              if ! ls "$DESTDIR/usr/lib/$dep" >/dev/null 2>&1; then
                echo "::warning::$elf still needs $dep (not bundled)"
                missing=$((missing+1))
              fi
            done < <(ldd "$elf" 2>/dev/null | awk '/=> not found/ {print $1}')
          done < <(find "$DESTDIR" -type f \( -name '*.so' -o -name '*.so.*' -o -path '*/bin/*' \))
          echo "Missing deps: $missing"

          # Step 3: Build the AppImage from the finalized AppDir.
          linuxdeploy-plugin-appimage --appdir "$DESTDIR"

          # Rename to a more descriptive name that signals UOS compatibility.
          for f in CopyQ-*.AppImage; do
            mv "$f" "CopyQ-${VERSION}-uos20-glibc2.28-x86_64.AppImage"
          done
          ls -la CopyQ-*.AppImage

      - name: Smoke-test AppImage
        env:
          APPIMAGE: CopyQ-${{ steps.version.outputs.version }}-uos20-glibc2.28-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          set -eux
          # Run the AppImage in extract-and-run mode (no FUSE in container).
          ./"$APPIMAGE" --version
          # Also extract once so we can inspect the bundled binary.
          ./"$APPIMAGE" --appimage-extract >/dev/null

          # Confirm critical runtime libraries are bundled.
          echo "--- Bundled libs in AppDir/usr/lib: ---"
          ls ./squashfs-root/usr/lib | sort
          for must_have in libOpenGL.so.0 libGLX.so.0 libGLdispatch.so.0; do
            if ! ls ./squashfs-root/usr/lib/"$must_have" >/dev/null 2>&1; then
              echo "::error::$must_have is missing from the AppImage"
              exit 1
            fi
          done
          echo "OpenGL loader libraries bundled correctly."

          # Verify glibc version requirement does not exceed 2.28.
          max_ver=$(objdump -T ./squashfs-root/usr/bin/copyq 2>/dev/null \
            | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V -u | tail -n1 || true)
          echo "Max GLIBC symbol required by copyq binary: ${max_ver:-<none>}"
          case "$max_ver" in
            ""|GLIBC_2.0|GLIBC_2.[0-9]|GLIBC_2.1[0-9]|GLIBC_2.2[0-8])
              echo "OK: fits into glibc 2.28"
              ;;
            *)
              echo "::warning::Binary references ${max_ver}, which is newer than 2.28 — it may not run on UOS 20."
              ;;
          esac
          rm -rf squashfs-root

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: CopyQ-UOS-AppImage
          path: CopyQ-*.AppImage
          if-no-files-found: error
